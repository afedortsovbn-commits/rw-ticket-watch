<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Переход на новый адрес</title>
    <script>
      const target = new URL("https://bilet.fedortsov.pro/");
      const oldPrefix = "/rw-ticket-watch/";
      const path = location.pathname.startsWith(oldPrefix)
        ? location.pathname.slice(oldPrefix.length)
        : "";

      target.pathname = `/${path}`;
      target.search = location.search;
      target.hash = location.hash;
      location.replace(target.toString());
    </script>
  </head>
  <body>
    <p>Переходим на <a href="https://bilet.fedortsov.pro/">bilet.fedortsov.pro</a>...</p>
  </body>
</html>
