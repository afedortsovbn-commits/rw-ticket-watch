services:
  - type: web
    name: rw-ticket-watch
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4174
      - key: CHECK_INTERVAL_MS
        value: 3000
      - key: TELEGRAM_MIN_INTERVAL_MS
        value: 60000
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
